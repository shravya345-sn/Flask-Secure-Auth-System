<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Admin Dashboard</title>
</head>
<body>
    <div class="container" style="width: 80%; max-width: 700px;">
        <h2>Admin Panel</h2>
        <table>
            <tr><th>ID</th><th>User</th><th>Role</th><th>Action</th></tr>
            {% for u in users %}
            <tr>
                <td>{{u.id}}</td>
                <td>{{u.username}}</td>
                <td>{{u.role}}</td>
                <td>
                    {% if u.role != 'admin' %}
                    <a href="{{ url_for('delete_user', id=u.id) }}" style="color:red;">Delete</a>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </table>
        <br>
        <a href="{{ url_for('logout') }}" class="btn-link btn-logout">Logout</a>
    </div>
</body>
</html>
